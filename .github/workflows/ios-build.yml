name: iOS build (unsigned)

# Bouwt een niet-gesigneerde iOS .ipa op een macOS-runner in de cloud.
# Je hebt hiervoor GEEN eigen Mac nodig. De .ipa komt als artifact beschikbaar;
# installeren op je iPhone doe je daarna met Sideloadly (gratis) of TestFlight.
#
# Start handmatig via het tabblad "Actions" → deze workflow → "Run workflow",
# of automatisch bij een push naar main/master.

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter --version

      # Genereer de iOS-projectmap (die zit niet in de repo).
      - name: Generate iOS platform files
        run: flutter create . --platforms=ios --org app.bitewise --project-name bitewise

      - name: Set iOS platform in Podfile
        run: sed -i.bak "s/^# platform :ios/platform :ios/" ios/Podfile

      # Camera-permissie voor mobile_scanner (setup_platform.ps1 is Windows-only).
      - name: Add camera usage description
        run: |
          /usr/libexec/PlistBuddy -c \
            "Add :NSCameraUsageDescription string 'Bitewise gebruikt de camera om barcodes te scannen.'" \
            ios/Runner/Info.plist || true

      - name: Install dependencies
        run: flutter pub get

      - name: Code generation (Drift)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build iOS (unsigned)
        run: flutter build ios --release --no-codesign

      - name: Package unsigned IPA
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -R Runner.app Payload/Runner.app
          zip -qr app-unsigned.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: bitewise-ios-unsigned
          path: build/ios/iphoneos/app-unsigned.ipa
          if-no-files-found: error
